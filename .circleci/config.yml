version: 2
jobs:
  go1.26: &base
    docker:
      - image: cimg/go:1.26
    steps:
      - run: go version
      - checkout
      - run: go test -race -v ./...

  go1.25:
    <<: *base
    docker:
      - image: cimg/go:1.25

  go1.24:
    <<: *base
    docker:
      - image: cimg/go:1.24

  go1.23:
    <<: *base
    docker:
      - image: cimg/go:1.23

  go1.22:
    <<: *base
    docker:
      - image: cimg/go:1.22

  go1.21:
    <<: *base
    docker:
      - image: cimg/go:1.21

  go1.20:
    <<: *base
    docker:
      - image: cimg/go:1.20

workflows:
  version: 2
  build:
    jobs:
      - go1.26
      - go1.25
      - go1.24
      - go1.23
      - go1.22
      - go1.21
      - go1.20
